name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/devops-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/devops-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend CI
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─────────────────────────────────────────
  # JOB 2: Frontend CI
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: SonarCloud Analysis
  # ─────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 4: DevSecOps — Security Scans
  # ─────────────────────────────────────────
  security:
    name: DevSecOps — Security Scan
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=critical

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=critical

      - name: Build backend image for Trivy scan
        run: docker build -t devops-backend:scan ./backend

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-backend:scan
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Build frontend image for Trivy scan
        run: docker build -t devops-frontend:scan ./frontend

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-frontend:scan
          format: table
          exit-code: '1'
          severity: CRITICAL

  # ─────────────────────────────────────────
  # JOB 5: Docker Build & Push
  # ─────────────────────────────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [sonarcloud, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}

      - name: Update image tags in manifests
        run: |
          sed -i "s|ampls9/devops-backend:.*|ampls9/devops-backend:${{ steps.tag.outputs.TAG }}|" k8s/backend.yaml
          sed -i "s|ampls9/devops-frontend:.*|ampls9/devops-frontend:${{ steps.tag.outputs.TAG }}|" k8s/frontend.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "ci: update images to ${{ steps.tag.outputs.TAG }}"
          git push
